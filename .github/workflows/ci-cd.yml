name: PureSecure CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write
  security-events: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: Code Quality & Linting
  # ──────────────────────────────────────────────
  lint:
    name: Code Quality (Flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Flake8 linting
        run: flake8 app/ tests/ --max-line-length=100 --output-file=flake8-report.txt --tee

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake8-report
          path: flake8-report.txt

  # ──────────────────────────────────────────────
  # Stage 2: SAST - Static Application Security Testing
  # ──────────────────────────────────────────────
  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml]

      - name: Run Bandit security scan
        run: |
          bandit -r app/ -ll -f json -o bandit-report.json || true
          bandit -r app/ -ll

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # ──────────────────────────────────────────────
  # Stage 2b: SAST - CodeQL Analysis
  # ──────────────────────────────────────────────
  codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python, javascript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  # ──────────────────────────────────────────────
  # Stage 3: SCA - Software Composition Analysis
  # ──────────────────────────────────────────────
  sca:
    name: SCA (Safety + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit safety

      - name: Run pip-audit (dependency vulnerabilities)
        run: |
          pip-audit --format=json --output=pip-audit-report.json || true
          pip-audit || true

      - name: Run Safety check
        run: |
          safety check --output=json > safety-report.json 2>&1 || true
          safety check || true

      - name: Upload SCA reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-reports
          path: |
            pip-audit-report.json
            safety-report.json

  # ──────────────────────────────────────────────
  # Stage 4: Secret Scanning
  # ──────────────────────────────────────────────
  secrets:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ──────────────────────────────────────────────
  # Stage 5: SBOM - Software Bill of Materials
  # ──────────────────────────────────────────────
  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install cyclonedx-bom

      - name: Generate CycloneDX SBOM (JSON)
        run: cyclonedx-py environment -o sbom.json --of json

      - name: Generate CycloneDX SBOM (XML)
        run: cyclonedx-py environment -o sbom.xml --of xml

      - name: Display SBOM summary
        run: |
          echo "=== SBOM Generated ==="
          echo "Format: CycloneDX"
          python -c "
          import json, os
          if os.path.exists('sbom.json'):
              with open('sbom.json') as f:
                  sbom = json.load(f)
              components = sbom.get('components', [])
              print(f'Total components: {len(components)}')
              for c in components:
                  name = c.get('name', 'unknown')
                  version = c.get('version', '?')
                  print(f'  - {name}@{version}')
          else:
              print('SBOM JSON not found, checking XML...')
          "

      - name: Upload SBOM artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.json
            sbom.xml

  # ──────────────────────────────────────────────
  # Stage 6: Unit & Integration Tests
  # ──────────────────────────────────────────────
  test:
    name: Tests (Pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest with coverage
        run: |
          pip install pytest-cov
          pytest tests/ -v --tb=short \
            --cov=app --cov-report=xml:coverage.xml \
            --cov-report=html:coverage-html \
            --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-html/

  # ──────────────────────────────────────────────
  # Stage 7: Build static site for GitHub Pages
  # ──────────────────────────────────────────────
  build:
    name: Build Site
    runs-on: ubuntu-latest
    needs: [lint, sast, codeql, sca, secrets, sbom, test]
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build static site
        run: |
          mkdir -p _site
          cp -r app/static/* _site/

          # Generate API config for GitHub Pages
          cat > _site/api-config.js << 'JSEOF'
          // PureSecure - GitHub Pages API Configuration
          // Since GitHub Pages is static, API calls go directly
          // to NVD. This config enables the static-site mode.
          window.PURESECURE_CONFIG = {
            mode: 'static',
            nvdApiBase: 'https://services.nvd.nist.gov/rest/json/cves/2.0',
            version: '1.0.0'
          };
          JSEOF

          # Create a 404.html that redirects to index for SPA routing
          cp _site/index.html _site/404.html

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # ──────────────────────────────────────────────
  # Stage 8: Deploy to GitHub Pages
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ──────────────────────────────────────────────
  # Stage 9: DAST - Dynamic Application Security Testing
  # ──────────────────────────────────────────────
  dast:
    name: DAST (ZAP Baseline)
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ needs.deploy.outputs.url || 'https://example.github.io/cve-new-bri/' }}
          rules_file_name: ".zap/rules.tsv"
          allow_issue_writing: false
        continue-on-error: true

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html
