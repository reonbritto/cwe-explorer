{{- if .Values.externalSecrets.enabled }}
# ── App secrets (FastAPI + Grafana) ──────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "puresecure.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: SecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
  data:
    {{- range .Values.externalSecrets.secrets }}
    - secretKey: {{ .kubeSecretKey }}
      remoteRef:
        key: {{ .remoteRef }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    {{- end }}
---
{{- if .Values.alertmanager.enabled }}
# ── Alertmanager SMTP secret ──────────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-smtp-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "puresecure.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: SecretStore
  target:
    name: alertmanager-smtp-secret
    creationPolicy: Owner
  data:
    {{- range .Values.externalSecrets.alertmanagerSecrets }}
    - secretKey: {{ .kubeSecretKey }}
      remoteRef:
        key: {{ .remoteRef }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    {{- end }}
{{- end }}
{{- end }}
