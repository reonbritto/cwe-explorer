{{- if .Values.promtail.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "puresecure.promtail.labels" . | nindent 4 }}
data:
  promtail.yaml: |
    server:
      http_listen_port: {{ .Values.promtail.port }}

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki:{{ .Values.loki.port }}/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        static_configs:
          - targets:
              - localhost
            labels:
              job: kubernetes-pods
              __path__: /var/log/pods/*/**/*.log
        relabel_configs:
          - source_labels: [__path__]
            regex: '/var/log/pods/([^_]+)_([^_]+)_[^/]+/([^/]+)/.*'
            target_label: namespace
            replacement: $1
          - source_labels: [__path__]
            regex: '/var/log/pods/([^_]+)_([^_]+)_[^/]+/([^/]+)/.*'
            target_label: pod
            replacement: $2
          - source_labels: [__path__]
            regex: '/var/log/pods/([^_]+)_([^_]+)_[^/]+/([^/]+)/.*'
            target_label: container
            replacement: $3
        pipeline_stages:
          - cri: {}
{{- end }}
