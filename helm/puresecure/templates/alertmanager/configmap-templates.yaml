{{- if .Values.alertmanager.enabled }}
# ── Email templates ConfigMap ─────────────────────────────────────────────────
# The HTML/text templates are stored here and mounted into the Alertmanager pod
# at /etc/alertmanager/templates/
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-templates
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "puresecure.alertmanager.labels" . | nindent 4 }}
data:
  puresecure.tmpl: |
    {{`
    {{/* ── Subject helpers ─────────────────────────────────────────────────── */}}
    {{ define "puresecure.subjectCritical" -}}
      🔴 [CRITICAL] {{ .GroupLabels.alertname }} — PureSecure
    {{- end }}
    {{ define "puresecure.subjectWarning" -}}
      🟡 [WARNING] {{ .GroupLabels.alertname }} — PureSecure
    {{- end }}

    {{/* ── Severity colour ─────────────────────────────────────────────────── */}}
    {{ define "puresecure.severityColor" -}}
      {{- if eq .CommonLabels.severity "critical" -}}#dc2626
      {{- else if eq .CommonLabels.severity "warning" -}}#d97706
      {{- else -}}#2563eb
      {{- end -}}
    {{- end }}

    {{/* ── Severity emoji ──────────────────────────────────────────────────── */}}
    {{ define "puresecure.severityEmoji" -}}
      {{- if eq .CommonLabels.severity "critical" -}}🔴
      {{- else if eq .CommonLabels.severity "warning" -}}🟡
      {{- else -}}🔵
      {{- end -}}
    {{- end }}

    {{/* ── Status label ────────────────────────────────────────────────────── */}}
    {{ define "puresecure.statusLabel" -}}
      {{- if eq .Status "firing" -}}FIRING
      {{- else -}}RESOLVED ✅
      {{- end -}}
    {{- end }}

    {{/* ══════════════════════════════════════════════════════════════════════
         HTML email template
         ══════════════════════════════════════════════════════════════════ */}}
    {{ define "email.puresecure.html" }}
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>PureSecure Alert</title>
      <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
               background: #f3f4f6; color: #111827; }
        .wrapper { max-width: 640px; margin: 32px auto; }
        .header { background: #0f172a; border-radius: 8px 8px 0 0; padding: 24px 32px; }
        .header-logo { font-size: 20px; font-weight: 700; color: #f8fafc;
                       display: flex; align-items: center; gap: 8px; }
        .status-bar { padding: 12px 32px; font-size: 13px; font-weight: 600;
                      letter-spacing: 0.05em; text-transform: uppercase; color: #fff; }
        .body { background: #fff; padding: 32px; }
        .summary-box { border-left: 4px solid; border-radius: 0 6px 6px 0;
                       padding: 14px 18px; margin-bottom: 28px; background: #f9fafb; }
        .summary-box h2 { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
        .summary-box p { font-size: 14px; color: #6b7280; }
        .section-title { font-size: 13px; font-weight: 600; text-transform: uppercase;
                         letter-spacing: 0.05em; color: #6b7280; margin-bottom: 14px; }
        .alert-card { border: 1px solid #e5e7eb; border-radius: 8px;
                      padding: 16px 20px; margin-bottom: 12px; }
        .alert-card-header { display: flex; justify-content: space-between;
                             align-items: flex-start; margin-bottom: 8px; }
        .alert-name { font-weight: 600; font-size: 15px; }
        .alert-badge { font-size: 11px; font-weight: 700; padding: 2px 8px;
                       border-radius: 99px; text-transform: uppercase; letter-spacing: 0.05em; }
        .alert-desc { font-size: 13px; color: #374151; margin-bottom: 10px; line-height: 1.5; }
        .alert-meta { font-size: 12px; color: #6b7280; }
        .alert-meta strong { color: #374151; }
        .divider { border: none; border-top: 1px solid #e5e7eb; margin: 24px 0; }
        .footer { background: #f9fafb; border-radius: 0 0 8px 8px;
                  padding: 20px 32px; text-align: center; }
        .footer p { font-size: 12px; color: #9ca3af; }
        .footer a { color: #6b7280; text-decoration: none; }
        .btn { display: inline-block; margin-top: 4px; padding: 10px 20px;
               background: #0f172a; color: #fff !important; border-radius: 6px;
               font-size: 13px; font-weight: 600; text-decoration: none; }
        .btn-alt { background: #374151; }
      </style>
    </head>
    <body>
    <div class="wrapper">

      <div class="header">
        <div class="header-logo">
          &#x1F6E1;&#xFE0F; PureSecure
        </div>
      </div>

      <div class="status-bar" style="background-color: {{ template "puresecure.severityColor" . }};">
        {{ template "puresecure.severityEmoji" . }}&nbsp;
        {{ template "puresecure.statusLabel" . }} &mdash;
        {{ .CommonLabels.severity | toUpper }} &mdash;
        {{ len .Alerts }} alert{{ if gt (len .Alerts) 1 }}s{{ end }}
      </div>

      <div class="body">

        <div class="summary-box" style="border-color: {{ template "puresecure.severityColor" . }};">
          <h2>{{ .CommonAnnotations.summary }}</h2>
          {{ with .CommonAnnotations.description }}<p>{{ . }}</p>{{ end }}
        </div>

        <p class="section-title">Alert Details</p>

        {{ range .Alerts }}
        <div class="alert-card">
          <div class="alert-card-header">
            <span class="alert-name">{{ .Labels.alertname }}</span>
            <span class="alert-badge" style="
              {{- if eq .Labels.severity "critical" -}}background:#fee2e2;color:#991b1b;
              {{- else if eq .Labels.severity "warning" -}}background:#fef3c7;color:#92400e;
              {{- else -}}background:#dbeafe;color:#1e40af;{{- end -}}">
              {{ .Labels.severity }}
            </span>
          </div>
          {{ with .Annotations.description }}
          <p class="alert-desc">{{ . }}</p>
          {{ end }}
          <div class="alert-meta">
            <strong>Status:</strong> {{ if eq .Status "firing" }}🔥 Firing{{ else }}✅ Resolved{{ end }}
            &nbsp;|&nbsp;
            <strong>Started:</strong> {{ .StartsAt.Format "2006-01-02 15:04 UTC" }}
            {{ if and (eq .Status "resolved") (.EndsAt) }}
            &nbsp;|&nbsp;<strong>Resolved:</strong> {{ .EndsAt.Format "2006-01-02 15:04 UTC" }}
            {{ end }}
            {{ with .Labels.job }}&nbsp;|&nbsp;<strong>Job:</strong> {{ . }}{{ end }}
            {{ with .Labels.endpoint }}&nbsp;|&nbsp;<strong>Endpoint:</strong> {{ . }}{{ end }}
          </div>
        </div>
        {{ end }}

        <hr class="divider">

        <div style="text-align:center;">
          <p style="font-size:13px;color:#6b7280;margin-bottom:16px;">
            View live metrics and alert status:
          </p>
          <a href="https://grafana.reondev.top" class="btn">Open Grafana &rarr;</a>
          &nbsp;
          <a href="https://reondev.top" class="btn btn-alt">PureSecure &rarr;</a>
        </div>

      </div>

      <div class="footer">
        <p>
          PureSecure CWE Explorer &mdash; Alertmanager<br>
          <a href="https://reondev.top">reondev.top</a>
        </p>
      </div>

    </div>
    </body>
    </html>
    {{ end }}


    {{/* ══════════════════════════════════════════════════════════════════════
         Plain-text fallback
         ══════════════════════════════════════════════════════════════════ */}}
    {{ define "email.puresecure.text" }}
    PureSecure — {{ template "puresecure.statusLabel" . }}
    {{ template "puresecure.severityEmoji" . }} Severity: {{ .CommonLabels.severity | toUpper }}
    Alerts: {{ len .Alerts }}
    ================================================================================

    {{ with .CommonAnnotations.summary }}Summary: {{ . }}{{ end }}
    {{ with .CommonAnnotations.description }}{{ . }}{{ end }}

    ── Alert Details ─────────────────────────────────────────────────────────────

    {{ range .Alerts -}}
    Alert:    {{ .Labels.alertname }}
    Severity: {{ .Labels.severity }}
    Status:   {{ .Status }}
    Started:  {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
    {{ if and (eq .Status "resolved") (.EndsAt) -}}
    Resolved: {{ .EndsAt.Format "2006-01-02 15:04:05 UTC" }}
    {{ end -}}
    {{ with .Annotations.description -}}
    Details:  {{ . }}
    {{ end -}}
    {{ with .Labels.job -}}Job: {{ . }}{{ end }}
    {{ with .Labels.endpoint -}}Endpoint: {{ . }}{{ end }}

    {{ end -}}
    ── Links ─────────────────────────────────────────────────────────────────────
    Grafana:    https://grafana.reondev.top
    PureSecure: https://reondev.top
    {{ end }}
    `}}
{{- end }}
